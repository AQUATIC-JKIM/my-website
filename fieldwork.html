<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fieldwork - Jiseung Kim</title>
    <style>
        /* --- 공통 레이아웃 스타일 --- */
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #666; background-color: #fff; text-align: center; min-height: 100vh; display: flex; flex-direction: column; }
        header { padding: 40px 0 20px 0; flex-shrink: 0; }
        .lab-name { font-size: 30px; font-weight: 700; letter-spacing: 2px; color: #777; text-transform: uppercase; }
        .univ-name { font-size: 19px; font-weight: 100; font-style: italic; color: #ccc; margin-left: 15px; letter-spacing: 2px; font-family: 'Segoe UI', sans-serif; }
        
        /* 네비게이션 스타일 */
        nav { border-top: 1px solid #eee; border-bottom: 1px solid #eee; flex-shrink: 0; }
        nav ul { list-style: none; display: flex; justify-content: center; padding: 0; margin: 0; gap: 35px; }
        nav li { position: relative; padding: 12px 0; }
        nav a { text-decoration: none; color: #999; font-size: 13px; transition: all 0.3s; }
        nav a.active { color: #333; font-weight: 700; }
        nav a:hover { color: #333; }
        
        .dropdown-content { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background-color: #fff; min-width: 120px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.05); z-index: 1; border: 1px solid #eee; padding: 5px 0; }
        .dropdown-content a { color: #999; padding: 10px 15px; display: block; text-align: center; font-size: 12px; }
        nav li:hover .dropdown-content { display: block; }

        /* --- Fieldwork 섹션 스타일 --- */
        main { flex-grow: 1; display: block; text-align: left; }
        
        .section-inner { 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 50px 20px 80px 20px; /* 상단 여백 추가 */
        }

        /* Fieldwork 그리드 스타일 */
        .fieldwork-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; margin-top: 40px; }
        .field-link { text-decoration: none; display: block; }
        .field-thumb { width: 100%; height: 280px; overflow: hidden; border-radius: 8px; border: 1px solid #eee; transition: all 0.3s; }
        .field-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .field-item:hover .field-thumb { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .field-meta { margin-top: 15px; }
        .field-date { display: block; font-size: 12px; color: #999; }
        .field-loc { display: block; font-size: 15px; color: #444; font-weight: 500; margin-top: 3px; }

        /* --- 공통 레이아웃 스타일 --- */
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #666; background-color: #fff; text-align: center; min-height: 100vh; display: flex; flex-direction: column; }
        header { padding: 40px 0 20px 0; flex-shrink: 0; }
        .lab-name { font-size: 30px; font-weight: 700; letter-spacing: 2px; color: #777; text-transform: uppercase; }
        .univ-name { font-size: 19px; font-weight: 100; font-style: italic; color: #ccc; margin-left: 15px; letter-spacing: 2px; font-family: 'Segoe UI', sans-serif; }
        
        /* 네비게이션 스타일 */
        nav { border-top: 1px solid #eee; border-bottom: 1px solid #eee; flex-shrink: 0; }
        nav ul { list-style: none; display: flex; justify-content: center; padding: 0; margin: 0; gap: 35px; }
        nav li { position: relative; padding: 12px 0; }
        nav a { text-decoration: none; color: #999; font-size: 13px; transition: all 0.3s; }
        nav a.active { color: #333; font-weight: 700; }
        nav a:hover { color: #333; }
        
        .dropdown-content { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background-color: #fff; min-width: 120px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.05); z-index: 1; border: 1px solid #eee; padding: 5px 0; }
        .dropdown-content a { color: #999; padding: 10px 15px; display: block; text-align: center; font-size: 12px; }
        nav li:hover .dropdown-content { display: block; }

        /* --- Archive 섹션 스타일 --- */
        main { flex-grow: 1; display: block; text-align: left; background-color: #fafafa; padding-bottom: 80px; }
        .section-inner { max-width: 1000px; margin: 0 auto; padding: 40px 20px 0 20px; background-color: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.02); min-height: 600px; border-radius: 8px; margin-top: 40px;}
        
        .archive-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 30px; }
        .archive-header h2 { font-size: 28px; color: #333; margin: 0; }
        .archive-controls button { background-color: #f0f0f0; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; color: #555; font-size: 13px; transition: background 0.2s; margin-left: 10px; }
        .archive-controls button:hover { background-color: #e0e0e0; color: #333; }

        /* 트리뷰(Taxonomy Tree) 스타일 */
        .taxonomy-tree { font-size: 14.5px; line-height: 1.6; color: #444; }
        .taxonomy-tree ul { list-style-type: none; padding-left: 24px; border-left: 1px dashed #ddd; margin-left: 8px; }
        .taxonomy-tree > ul { border-left: none; padding-left: 0; margin-left: 0; }
        .taxonomy-tree li { margin: 6px 0; position: relative; }
        
        details > summary { cursor: pointer; list-style: none; display: flex; align-items: center; transition: color 0.2s; padding: 3px 0; }
        details > summary::-webkit-details-marker { display: none; }
        details > summary::before { content: '\f0da'; font-family: 'Font Awesome 6 Free'; font-weight: 900; display: inline-block; width: 16px; margin-right: 5px; color: #aaa; transition: transform 0.2s; }
        details[open] > summary::before { transform: rotate(90deg); color: #007bff; }
        details > summary:hover { color: #007bff; }
        
        /* 터미널 노드(종) 스타일 */
        .species-item { padding-left: 21px; display: flex; align-items: center; }
        .species-item::before { content: '\f111'; font-family: 'Font Awesome 6 Free'; font-weight: 400; font-size: 6px; position: absolute; left: 5px; top: 12px; color: #ccc; }

        /* 분류군 텍스트 스타일 */
        .rank { font-size: 12px; font-weight: bold; color: #888; text-transform: uppercase; margin-right: 8px; background: #f4f4f4; padding: 2px 6px; border-radius: 3px; }
        .name { font-weight: 500; color: #333; }
        .italic-name { font-style: italic; font-weight: 600; color: #222; }
        .author { color: #777; font-size: 13.5px; margin-left: 5px; }
        .ko-name { color: #0066cc; margin-left: 8px; font-size: 14px; font-weight: 500; }

        /* --- 푸터 스타일 --- */
        footer { border-top: 1px solid #eee; padding: 40px 50px; display: flex; justify-content: center; flex-shrink: 0; background-color: #fff;}
        .footer-container { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; max-width: 1200px; }
        .footer-info { font-size: 13px; line-height: 1.8; color: #555; text-align: left; }
        .footer-info a { color: #007bff; text-decoration: none; }
        .footer-social { display: flex; gap: 20px; align-items: center; padding-top: 10px; }
        .social-icon { color: #888; font-size: 20px; text-decoration: none; transition: color 0.3s ease; display: flex; align-items: center; justify-content: center; }
        .social-icon:hover { color: #333; }
        .naver-icon span { width: 20px; height: 20px; background-color: #888; color: #fff; border-radius: 50%; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: background-color 0.3s ease; }
        .naver-icon:hover span { background-color: #333; }
    </style>
</head>
